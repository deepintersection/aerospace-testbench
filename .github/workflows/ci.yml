name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint & format check ─────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run ruff (lint)
        run: uv run ruff check .

      - name: Run ruff (format check)
        run: uv run ruff format --check .

  # ── Type checking ───────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy src/

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    # Unit tests use SQLite in-memory and pyvisa-sim — no real hardware or DB
    # needed.  Integration tests that need PostgreSQL are skipped in CI via the
    # `@pytest.mark.integration` marker and the -m flag below.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: |
          uv run pytest -m "not integration and not hardware" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true  # non-blocking until coverage gate is set

  # ── Matrix for Python version compatibility ──────────────────────────────────
  test-matrix:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest -m "not integration and not hardware" -v
